<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseUp Write Post</title>
  <style>
    :root {
      --background: #0A0A0A;
      --surface: #141414;
      --surface-elevated: #1E1E1E;
      --primary: #FF4444;
      --primary-dim: rgba(255, 68, 68, 0.15);
      --text-primary: #FFFFFF;
      --text-secondary: #A0A0A0;
      --text-muted: #606060;
      --border: #2A2A2A;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--background);
      color: var(--text-primary);
      font-family: system-ui, -apple-system, "Pretendard", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .screen {
      width: 375px;
      height: 812px;
      padding: 22px 20px 18px;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 92% 0%, rgba(255, 68, 68, 0.12), transparent 26%),
        var(--background);
    }

    .topbar {
      display: grid;
      grid-template-columns: 64px 1fr 64px;
      align-items: center;
      margin-bottom: 26px;
    }

    .topbar button {
      border: 0;
      background: transparent;
      padding: 0;
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 700;
      text-align: left;
    }

    .topbar .submit {
      color: var(--primary);
      text-align: right;
    }

    .topbar h1 {
      margin: 0;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
    }

    .input {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text-primary);
      font-family: inherit;
    }

    .title-input {
      font-size: 31px;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 18px;
    }

    .body-input {
      min-height: 320px;
      font-size: 16px;
      line-height: 1.7;
      color: var(--text-secondary);
      resize: none;
    }

    .input::placeholder {
      color: var(--text-muted);
    }

    .guide {
      margin-top: auto;
      padding: 18px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255, 68, 68, 0.18), rgba(255, 68, 68, 0.07));
      border: 1px solid rgba(255, 68, 68, 0.24);
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.28);
    }

    .guide strong {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 15px;
    }

    .guide p {
      margin: 0;
      color: #ffcccc;
      font-size: 14px;
      line-height: 1.65;
    }

    .count {
      text-align: right;
      margin-top: 14px;
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="screen">
    <header class="topbar">
      <button type="button">취소</button>
      <h1>새 글 작성</h1>
      <button class="submit" type="button">게시</button>
    </header>

    <input class="input title-input" type="text" placeholder="제목을 입력하세요" value="오늘 하루를 버틴 사람들에게"/>
    <textarea class="input body-input" placeholder="내용을 입력하세요">퇴근하고 집에 돌아와도 머릿속이 계속 웅웅거린다. 그래도 오늘을 버텨낸 것만으로 충분했다고 말해주고 싶어서 글을 남긴다. 누군가에게는 이 문장이 10분쯤 더 살아 있을 이유가 되었으면 좋겠다.</textarea>

    <aside class="guide">
      <strong>💓 이 글은 6시간의 생명력을 갖고 태어납니다</strong>
      <p>좋아요를 받으면 +10분, 싫어요를 받으면 -10분. 반응에 따라 글의 맥박이 길어지거나 멎습니다.</p>
    </aside>

    <div class="count">148 / 500</div>
  </main>
</body>
</html>
