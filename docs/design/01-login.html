<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseUp Login</title>
  <style>
    :root {
      --background: #0A0A0A;
      --surface: #141414;
      --surface-elevated: #1E1E1E;
      --primary: #FF4444;
      --primary-dim: rgba(255, 68, 68, 0.15);
      --text-primary: #FFFFFF;
      --text-secondary: #A0A0A0;
      --text-muted: #606060;
      --border: #2A2A2A;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 68, 68, 0.24), transparent 34%),
        radial-gradient(circle at 50% 82%, rgba(255, 68, 68, 0.08), transparent 28%),
        var(--background);
      color: var(--text-primary);
      font-family: system-ui, -apple-system, "Pretendard", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .screen {
      width: 375px;
      height: 812px;
      padding: 80px 28px 42px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      isolation: isolate;
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 36px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      pointer-events: none;
    }

    .brand {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .ecg-wrap {
      width: 220px;
      height: 64px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255, 68, 68, 0.08), rgba(255, 68, 68, 0.02));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(255, 68, 68, 0.2);
    }

    .brand h1 {
      margin: 0;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 0.24em;
    }

    .subtitle {
      margin: 12px 0 0;
      color: var(--text-secondary);
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .login-panel {
      margin-top: auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }

    .google-button {
      width: 100%;
      padding: 16px 18px;
      border: 0;
      border-radius: 18px;
      background: #FFFFFF;
      color: #111111;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }

    .hint {
      padding: 16px 18px;
      border-radius: 18px;
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }

    .footnote {
      margin-top: auto;
      color: var(--text-muted);
      font-size: 13px;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <main class="screen">
    <section class="brand">
      <div class="ecg-wrap" aria-hidden="true">
        <svg width="188" height="40" viewBox="0 0 188 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="pulseGlow" x="-20" y="-20" width="228" height="80" color-interpolation-filters="sRGB">
              <feGaussianBlur stdDeviation="4" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <path d="M4 20H38L50 20L60 6L72 34L84 14L92 20H112L124 20L132 26L142 12L152 20H184" stroke="#FF4444" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#pulseGlow)"/>
        </svg>
      </div>
      <div>
        <h1>PULSEUP</h1>
        <p class="subtitle">이 글은 아직 살아있다</p>
      </div>
    </section>

    <section class="login-panel">
      <button class="google-button" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.5 3.9-5.5 3.9-3.3 0-6.1-2.8-6.1-6.2s2.8-6.2 6.1-6.2c1.9 0 3.2.8 4 1.5l2.7-2.6C17 2.9 14.8 2 12 2 6.9 2 2.8 6.2 2.8 11.4S6.9 20.8 12 20.8c6.9 0 9.1-4.8 9.1-7.3 0-.5 0-.9-.1-1.3H12Z"/>
          <path fill="#34A853" d="M2.8 11.4c0 1.7.6 3.3 1.7 4.6l3-2.4c-.3-.6-.5-1.4-.5-2.2s.2-1.5.5-2.2l-3-2.4c-1.1 1.3-1.7 2.9-1.7 4.6Z"/>
          <path fill="#4A90E2" d="M12 20.8c2.8 0 5.2-.9 6.9-2.5l-3.4-2.7c-.9.7-2 1.2-3.5 1.2-2.6 0-4.9-1.7-5.7-4.1l-3.1 2.4c1.7 3.4 5.1 5.7 8.8 5.7Z"/>
          <path fill="#FBBC05" d="M6.3 12.7c-.2-.6-.3-1.3-.3-1.9s.1-1.3.3-1.9L3.2 6.5C2.5 7.9 2 9.6 2 11.4c0 1.8.5 3.5 1.2 4.9l3.1-2.4Z"/>
        </svg>
        Google로 시작하기
      </button>
      <div class="hint">
        익명으로 사라지는 글들이 아니라, 커뮤니티의 반응으로 맥박이 이어지는 게시판입니다.
      </div>
    </section>

    <div class="footnote">모든 글은 태어날 때부터 6시간의 생명력을 가집니다</div>
  </main>
</body>
</html>
