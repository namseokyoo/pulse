<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Report Modal</title>
  <style>
    :root {
      --background: #0A0A0A;
      --surface: #141414;
      --surface-elevated: #1E1E1E;
      --primary: #FF4444;
      --primary-dim: rgba(255, 68, 68, 0.15);
      --text-primary: #FFFFFF;
      --text-secondary: #A0A0A0;
      --text-muted: #606060;
      --border: #2A2A2A;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Pretendard", sans-serif;
      background: #090909;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: stretch;
    }

    .screen {
      width: 375px;
      height: 812px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(10, 10, 10, 0.4), rgba(10, 10, 10, 0.82)),
        radial-gradient(circle at 50% 18%, rgba(255, 68, 68, 0.12), transparent 24%),
        #0A0A0A;
    }

    .ghost-post {
      position: absolute;
      inset: 80px 20px auto;
      padding: 18px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.04);
      filter: blur(1px);
    }

    .ghost-post h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .ghost-post p {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.62);
    }

    .sheet {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px 20px 24px;
      border-radius: 28px 28px 0 0;
      background: var(--surface);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 -24px 60px rgba(0, 0, 0, 0.45);
      color: var(--text-primary);
    }

    .handle {
      width: 46px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      margin: 0 auto 18px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
    }

    .sub {
      margin: 8px 0 18px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 12px;
    }

    .reason {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      color: var(--text-primary);
      font-size: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .radio {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .radio.selected {
      border-color: var(--primary);
    }

    .radio.selected::after {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 14px rgba(255, 68, 68, 0.35);
    }

    .other-input {
      width: 100%;
      margin: 14px 0 18px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255, 68, 68, 0.22);
      background: rgba(255, 68, 68, 0.08);
      color: var(--text-secondary);
      font-size: 14px;
    }

    .submit {
      width: 100%;
      padding: 16px 18px;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(180deg, #ff6565, var(--primary));
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 12px;
      box-shadow: 0 16px 34px rgba(255, 68, 68, 0.26);
    }

    .cancel {
      text-align: center;
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="screen">
    <div class="ghost-post">
      <h2>문제가 되는 게시물 미리보기</h2>
      <p>원래 콘텐츠는 뒤에 가려져 있고, 신고 모달만 강조된 상태입니다.</p>
    </div>
    <div class="overlay"></div>

    <section class="sheet" aria-label="신고하기 모달">
      <div class="handle" aria-hidden="true"></div>
      <h1>신고하기</h1>
      <p class="sub">이 글을 신고합니다</p>
      <div class="divider"></div>

      <div class="reason"><span>욕설/혐오 표현</span><span class="radio"></span></div>
      <div class="reason"><span>음란 내용</span><span class="radio"></span></div>
      <div class="reason"><span>스팸/도배</span><span class="radio"></span></div>
      <div class="reason"><span>기타</span><span class="radio selected"></span></div>

      <div class="other-input">타인을 직접적으로 조롱하는 표현이 반복적으로 포함되어 있습니다.</div>
      <button class="submit" type="button">신고하기</button>
      <div class="cancel">취소</div>
    </section>
  </main>
</body>
</html>
